syntax = "proto3";

package master;

message HeartbeatRequest {
  int64 timestamp = 1;
}

message HeartbeatResponse {
  string worker_id = 1;
  int32 current_task_count = 2;
  string status = 3;  // "idle", "busy", "full"
  repeated string in_progress_task_ids = 4;  // Tasks currently being processed
}

message TaskUpdateRequest {
  string worker_id = 1;
  string task_id = 2;
  string status = 3;  // "started", "completed", "failed"
  string url = 4;
  string error_message = 5;  // Only if status is "failed"
  int64 timestamp = 6;
}

message TaskUpdateResponse {
  bool acknowledged = 1;
}

message WorkerStatusRequest {
  string worker_id = 1;
}

message WorkerStatusResponse {
  string worker_id = 1;
  string status = 2;  // "active", "idle", "offline", "error"
  int64 last_heartbeat = 3;
  int64 created_at = 4;
  int32 current_task_count = 5;
  repeated string in_progress_task_ids = 6;
}

service MasterService {
  rpc ReportTaskUpdate(TaskUpdateRequest) returns (TaskUpdateResponse);
  rpc GetWorkerStatus(WorkerStatusRequest) returns (WorkerStatusResponse);
}

service WorkerService {
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}
