version: "3.9"

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - data:/data/db
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
          
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=password
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app-network
  
  redis-insights:
    image: redislabs/redisinsight:latest
    container_name: redis-insights
    ports:
      - "8001:8001"
    networks:
      - app-network

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=master
      - POSTGRES_PASSWORD=masterpass
      - POSTGRES_DB=crawler
    networks:
      - app-network

  frontier:
    build:
      context: .
      dockerfile: services/frontier/Dockerfile
    container_name: frontier
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/crawler
      - RABBITMQ_URL=amqp://admin:password@rabbitmq:5672/
      - DATABASE_URL=postgresql+psycopg2://master:masterpass@postgres:5432/crawler
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      postgres:
        condition: service_started
    networks:
      - app-network

  master:
    build:
      context: .
      dockerfile: services/master/Dockerfile
    container_name: master
    environment:
      - RABBITMQ_URL=amqp://admin:password@rabbitmq:5672/
      - DATABASE_URL=postgresql+psycopg2://master:masterpass@postgres:5432/crawler
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      rabbitmq:
        condition: service_started
      postgres:
        condition: service_started
    networks:
      - app-network

  worker:
    build:
      context: .
      dockerfile: services/slave/Dockerfile
    image: worker:latest
    profiles:
      - donotstart
    networks:
      - app-network

volumes:
  data:
    driver: local

networks:
  app-network:
    driver: bridge