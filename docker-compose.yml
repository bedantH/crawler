services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=password
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7.2
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "8001:5540"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=master
      - POSTGRES_PASSWORD=masterpass
      - POSTGRES_DB=crawler
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U master -d crawler" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@example.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  frontier:
    build:
      context: .
      dockerfile: services/frontier/Dockerfile
    container_name: frontier
    ports:
      - "8080:8080"
    environment:
      - RABBITMQ_URL=amqp://admin:password@rabbitmq:5672/
      - DATABASE_URL=postgresql+asyncpg://master:masterpass@postgres:5432/crawler
      - REDIS_HOST=redis
      - MASTER_PROTO=master:50052
      - DEV=1
    volumes:
      - ./services/frontier/src:/app/services/frontier/src:delegated
      - ./shared/src:/app/shared/src:delegated
      - ./services/frontier/pyproject.toml:/app/services/frontier/pyproject.toml:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    command: [ "uv", "run", "--package", "frontier", "uvicorn", "frontier.main:app", "--host", "0.0.0.0", "--port", "8080", "--reload" ]

  master:
    build:
      context: .
      dockerfile: services/master/Dockerfile
    container_name: master
    environment:
      - RABBITMQ_URL=amqp://admin:password@rabbitmq:5672/
      - DATABASE_URL=postgresql+asyncpg://master:masterpass@postgres:5432/crawler
      - REDIS_HOST=redis
      - FRONTIER_PROTO=frontier:50051
      - DOCKER_HOST=unix:///var/run/docker.sock
      - WORKER_NETWORK=crawler_app-network
      - DEV=1
    volumes:
      - ./services/master/src:/app/services/master/src:delegated
      - ./shared/src:/app/shared/src:delegated
      - ./services/master/pyproject.toml:/app/services/master/pyproject.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - app-network
    # Dev override: run master with watchfiles-based watcher
    command: [ "uv", "run", "--package", "master", "python", "/app/services/master/src/dev_watch.py" ]

  worker:
    build:
      context: .
      dockerfile: services/slave/Dockerfile
    image: worker:latest
    profiles:
      - donotstart
    volumes:
      - ./services/slave/src:/app/services/slave/src:delegated
      - ./shared/src:/app/shared/src:delegated
      - ./services/slave/pyproject.toml:/app/services/slave/pyproject.toml:ro
    environment:
      - DEV=1
    command: [ "python", "/app/services/slave/src/dev_watch.py" ]
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
